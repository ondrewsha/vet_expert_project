services:
  db:
    image: postgres:15-alpine
    container_name: zoomedica_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Moscow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:6.0
    container_name: zoomedica_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: zoomedica_redis
    restart: always
    volumes:
      - redis_data:/data
    logging: *default-logging

  backend:
    build: 
      context: ./backend
    container_name: zoomedica_backend
    restart: always
    environment:
      - TZ=Europe/Moscow
    env_file:
      - .env
    depends_on:
      - db
      - mongo
      - redis
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 4
    logging: *default-logging

  celery_worker:
    build: 
      context: ./backend
    container_name: zoomedica_worker
    restart: always
    environment:
      - TZ=Europe/Moscow
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - mongo
    command: celery -A src.celery_app worker --loglevel=info
    logging: *default-logging

  celery_beat:
    build: 
      context: ./backend
    container_name: zoomedica_beat
    restart: always
    environment:
      - TZ=Europe/Moscow
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - mongo
    command: celery -A src.celery_app beat --loglevel=info
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://zoo-medica.ru/api
    container_name: zoomedica_frontend
    restart: always
    depends_on:
      - backend
    logging: *default-logging

  nginx:
    image: nginx:stable-alpine
    container_name: zoomedica_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    logging: *default-logging

  certbot:
    image: certbot/certbot
    container_name: zoomedica_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  mongo_data:
  redis_data: