<svg xmlns="http://www.w3.org/1490/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" /> <!-- изумрудный (светлый) -->
      <stop offset="100%" stop-color="#10b981" /> <!-- primary (основной) -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Фон-Квадрат со скругленными углами -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Лапка животного (Белая) -->
  <g fill="#ffffff" transform="translate(50, 50) scale(1.1) translate(-50, -50)">
    <!-- Центральная подушечка -->
    <path d="M50 70 C 40 70, 32 60, 35 48 C 38 35, 62 35, 65 48 C 68 60, 60 70, 50 70 Z" />
    <!-- Пальцы -->
    <circle cx="32" cy="38" r="8" />
    <circle cx="43" cy="28" r="8" />
    <circle cx="57" cy="28" r="8" />
    <circle cx="68" cy="38" r="8" />
  </g>
</svg>